<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- AppCityAgent - Orchestrator Brain with connections -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9c27b0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7b1fa2;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Brain/Head -->
  <rect x="136" y="60" width="240" height="160" rx="40" ry="40" stroke="url(#grad1)" stroke-width="24" fill="none"/>
  <!-- Eyes -->
  <circle cx="210" cy="140" r="22" fill="url(#grad1)"/>
  <circle cx="302" cy="140" r="22" fill="url(#grad1)"/>
  <!-- Neck -->
  <rect x="230" y="220" width="52" height="36" fill="url(#grad1)"/>
  <!-- Body -->
  <rect x="120" y="256" width="272" height="180" rx="28" ry="28" stroke="url(#grad1)" stroke-width="24" fill="none"/>
  <!-- Left connection (Sales) -->
  <circle cx="80" cy="320" r="28" stroke="url(#grad1)" stroke-width="16" fill="none"/>
  <line x1="108" y1="320" x2="132" y2="320" stroke="url(#grad1)" stroke-width="12"/>
  <text x="68" y="328" font-size="28" fill="#9c27b0" font-weight="bold">S</text>
  <!-- Right connection (ERP) -->
  <circle cx="432" cy="320" r="28" stroke="url(#grad1)" stroke-width="16" fill="none"/>
  <line x1="380" y1="320" x2="404" y2="320" stroke="url(#grad1)" stroke-width="12"/>
  <text x="420" y="328" font-size="28" fill="#9c27b0" font-weight="bold">E</text>
  <!-- Center gear icon -->
  <path d="M256 310 L268 320 L268 340 L256 350 L244 340 L244 320 Z" fill="url(#grad1)"/>
  <circle cx="256" cy="330" r="8" fill="white"/>
  <!-- Arrows between body parts -->
  <path d="M200 360 L170 380 M312 360 L342 380" stroke="url(#grad1)" stroke-width="8" stroke-linecap="round"/>
</svg>
