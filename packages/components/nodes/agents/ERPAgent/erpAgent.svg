<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- ERPAgent - Database/Gear robot -->
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#673ab7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9c27b0;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Head -->
  <rect x="156" y="50" width="200" height="140" rx="36" ry="36" stroke="url(#grad2)" stroke-width="22" fill="none"/>
  <!-- Eyes -->
  <circle cx="218" cy="120" r="18" fill="url(#grad2)"/>
  <circle cx="294" cy="120" r="18" fill="url(#grad2)"/>
  <!-- Neck -->
  <rect x="234" y="190" width="44" height="30" fill="url(#grad2)"/>
  <!-- Body -->
  <rect x="136" y="220" width="240" height="170" rx="24" ry="24" stroke="url(#grad2)" stroke-width="22" fill="none"/>
  <!-- Database icon on body -->
  <ellipse cx="256" cy="280" rx="50" ry="16" stroke="url(#grad2)" stroke-width="10" fill="none"/>
  <path d="M206 280 L206 330 Q206 346 256 346 Q306 346 306 330 L306 280" stroke="url(#grad2)" stroke-width="10" fill="none"/>
  <path d="M206 305 Q206 321 256 321 Q306 321 306 305" stroke="url(#grad2)" stroke-width="8" fill="none"/>
  <!-- Gear bottom-right -->
  <circle cx="380" cy="400" r="48" stroke="url(#grad2)" stroke-width="16" fill="none"/>
  <circle cx="380" cy="400" r="18" fill="url(#grad2)"/>
  <!-- Gear teeth -->
  <rect x="372" y="344" width="16" height="20" fill="url(#grad2)" rx="4"/>
  <rect x="372" y="436" width="16" height="20" fill="url(#grad2)" rx="4"/>
  <rect x="324" y="392" width="20" height="16" fill="url(#grad2)" rx="4"/>
  <rect x="420" y="392" width="20" height="16" fill="url(#grad2)" rx="4"/>
</svg>
