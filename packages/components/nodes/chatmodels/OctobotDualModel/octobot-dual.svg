<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <circle cx="50" cy="50" r="45" fill="#1a1a2e" stroke="#e94560" stroke-width="3"/>
  <!-- Eyes -->
  <circle cx="35" cy="42" r="7" fill="#e94560"/>
  <circle cx="65" cy="42" r="7" fill="#e94560"/>
  <!-- Smile -->
  <path d="M 30 65 Q 50 80 70 65" stroke="#e94560" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Antenna lines -->
  <line x1="20" y1="30" x2="10" y2="15" stroke="#e94560" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="80" y1="30" x2="90" y2="15" stroke="#e94560" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="15" y1="55" x2="5" y2="50" stroke="#e94560" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="85" y1="55" x2="95" y2="50" stroke="#e94560" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Dual key indicator — two overlapping key shapes at bottom -->
  <circle cx="40" cy="82" r="4" fill="#00d4aa" opacity="0.9"/>
  <circle cx="60" cy="82" r="4" fill="#00d4aa" opacity="0.6"/>
  <!-- Link line between keys -->
  <line x1="44" y1="82" x2="56" y2="82" stroke="#00d4aa" stroke-width="1.5" stroke-dasharray="2,2"/>
</svg>
