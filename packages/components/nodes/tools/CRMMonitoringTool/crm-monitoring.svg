<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- CRM Monitoring Tool - Radar/Live signal + Heartbeat/Telemetry -->
  <defs>
    <linearGradient id="monitorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle with border -->
  <circle cx="50" cy="50" r="46" fill="url(#monitorGrad)" opacity="0.12"/>
  <circle cx="50" cy="50" r="46" fill="none" stroke="url(#monitorGrad)" stroke-width="2"/>
  
  <!-- Outer Live Signal rings -->
  <circle cx="50" cy="50" r="28" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.5"/>
  <circle cx="50" cy="50" r="20" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.3"/>
  
  <!-- Live telemetry pulse wave/Heartbeat -->
  <path d="M26 50 L38 50 L42 38 L48 62 L52 46 L55 54 L58 50 L74 50" fill="none" stroke="#3b82f6" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Pulse green glowing node dot (Live indicator) -->
  <circle cx="48" cy="62" r="5" fill="#10b981"/>
  
  <!-- Eye/Camera Monitoring overlay -->
  <g transform="translate(70, 28)">
    <circle cx="0" cy="0" r="12" fill="#10b981" opacity="0.95"/>
    <!-- Eye shape -->
    <path d="M-6 0 C-3 -4 3 -4 6 0 C3 4 -3 4 -6 0 Z" fill="none" stroke="white" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="2" fill="white"/>
  </g>
</svg>
